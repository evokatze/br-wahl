<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liste 8 – Dankeschön</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:   #FFD600;
    --yellow-light: #fff1b3;
    --yellow-dark: #E6C200;
    --black:    #111111;
    --charcoal: #2A2A2A;
    --poster-w: 297mm;
    --poster-h: 420mm;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ddd; font-family: 'Barlow', sans-serif; }

  .page-container { display: flex; justify-content: center; padding: 40px 0; }

  .poster {
    width: var(--poster-w);
    height: var(--poster-h);
    background: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .slash-bg {
    position: absolute; 
    top: -20mm; 
    right: -30mm;
    width: 175mm; 
    height: 460mm;
    background: var(--yellow-light);
    transform: skewX(-12deg);
    z-index: 1;
  }

  .accent-circle {
    position: absolute; bottom: 120mm; right: 20mm; width: 80mm; height: 80mm;
    border: 1px solid rgba(255,214,0,0.3); border-radius: 50%; z-index: 2;
  }
  
  .accent-circle::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 60mm; height: 60mm; border: 1px solid rgba(255,214,0,0.2); border-radius: 50%;
  }

  .top-rule {
    position: absolute; top: 14mm; left: 16mm; right: 16mm; height: 1.5px;
    background: linear-gradient(90deg, var(--black) 0%, var(--black) 30%, transparent 100%); z-index: 2;
  }

  .eight {
    position: absolute; top: 28mm; right: 8mm; z-index: 2; font-family: 'Bebas Neue', sans-serif;
    font-size: 205mm; line-height: 1; letter-spacing: -6mm;
    color: transparent; -webkit-text-stroke: 2.5px var(--yellow); opacity: 0.25;
  }

  /* Zentrale Nachricht */
  .thanks-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    text-align: center;
    z-index: 10;
  }

  .thanks-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 70pt;
    line-height: 1.1;
    color: var(--black);
  }

  .thanks-text span {
    background: var(--yellow);
    padding: 0 15px;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 36mm;
    background: linear-gradient(90deg, var(--yellow) 0%, var(--yellow-dark) 100%); z-index: 6;
  }

  @media print {
    @page { size: 297mm 420mm portrait; margin: 0; }
    body { background: white; }
    .page-container { padding: 0; }
    .poster { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="page-container">
  <div class="poster">
    <div class="slash-bg"></div>
    <div class="accent-circle"></div>
    <div class="top-rule"></div>
    <div class="eight">8</div>
    
    <div class="thanks-container">
      <h1 class="thanks-text">Vielen Dank für<br><span>euer Vertrauen!</span></h1>
    </div>

    <div class="bottom-bar"></div>
  </div>
</div>

</body>
</html>
